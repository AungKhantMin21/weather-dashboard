name: Deployment Pipeline

on:
  push:
    tags:
      - 'v*'
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tags
        id: tags
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Client Docker image
        run: |
          docker build -t aungkhantmin21/weather-dashboard-client:${{ steps.tags.outputs.TAG }} -f ./web/Dockerfile ./web/.
          docker push aungkhantmin21/weather-dashboard-client:${{ steps.tags.outputs.TAG }}

          docker tag aungkhantmin21/weather-dashboard-client:${{ steps.tags.outputs.TAG }} aungkhantmin21/weather-dashboard-client:latest
          docker push aungkhantmin21/weather-dashboard-client:latest
      
      - name: Build and push Server Docker image
        run: |
          docker build -t aungkhantmin21/weather-dashboard-server:${{ steps.tags.outputs.TAG }} -f ./server/Dockerfile ./server/.
          docker push aungkhantmin21/weather-dashboard-server:${{ steps.tags.outputs.TAG }}

          docker tag aungkhantmin21/weather-dashboard-server:${{ steps.tags.outputs.TAG }} aungkhantmin21/weather-dashboard-server:latest
          docker push aungkhantmin21/weather-dashboard-server:latest
      
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Extract tags
        id: tags
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/weather-dashboard
            git fetch --all
            git checkout main
            git pull origin main

            kubectl apply -R -f ./kubernetes/

            kubectl set image deployment/web web=aungkhantmin21/weather-dashboard-client:${{ steps.tags.outputs.TAG }}
            kubectl annotate deployment/web kubernetes.io/change-cause="Deploying version ${{ steps.tags.outputs.TAG }}"
            
            kubectl set image deployment/server server=aungkhantmin21/weather-dashboard-server:${{ steps.tags.outputs.TAG }}
            kubectl annotate deployment/server kubernetes.io/change-cause="Deploying version ${{ steps.tags.outputs.TAG }}"

            kubectl rollout status deployment/web --timeout=120s
            kubectl rollout status deployment/server --timeout=120s
      

        