name: UAT Deployment Pipeline

on:
  push:
    tags:
      - 'uat-*'
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tags
        id: tags
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Client Docker image
        run: |
          docker build -t aungkhantmin21/weather-dashboard-client:${{ steps.tags.outputs.TAG }} -f ./web/Dockerfile ./web/.
          docker push aungkhantmin21/weather-dashboard-client:${{ steps.tags.outputs.TAG }}
      
      - name: Build and push Server Docker image
        run: |
          docker build -t aungkhantmin21/weather-dashboard-server:${{ steps.tags.outputs.TAG }} -f ./server/Dockerfile ./server/.
          docker push aungkhantmin21/weather-dashboard-server:${{ steps.tags.outputs.TAG }}
